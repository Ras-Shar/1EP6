<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AtaxAI — Logo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;650;750&display=swap" rel="stylesheet" />
    <style>
      :root {
        --navy: #0b1b34;
        --font: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
        --border: rgba(15, 23, 42, 0.10);
        --muted: rgba(11, 27, 52, 0.62);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family: var(--font);
        color: var(--navy);
        background: #ffffff;
        padding: 44px 28px 88px;
      }

      .sheet {
        width: min(1300px, 96vw);
        margin: 0 auto;
        display: grid;
        gap: 34px;
      }

      .variant {
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: clamp(22px, 3.5vw, 40px);
      }

      .variant-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 14px;
        margin-bottom: 14px;
      }

      .variant-title {
        margin: 0;
        font-size: 14px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
        font-weight: 650;
      }

      .variant-note {
        margin: 0;
        font-size: 13px;
        color: var(--muted);
        font-weight: 500;
      }

      .logo {
        width: min(1200px, 92vw);
        height: auto;
        display: block;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    </style>
  </head>
  <body>
    <main class="sheet" aria-label="AtaxAI logo options">
